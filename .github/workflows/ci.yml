name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install black flake8

      - name: Check formatting
        run: black --check .

      - name: Lint
        run: flake8 . --max-line-length=120 --exclude=venv
