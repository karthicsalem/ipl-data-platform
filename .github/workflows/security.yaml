name: Security Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write # needed to upload SARIF to GitHub Security tab
  pull-requests: write # needed to post PR comment

jobs:
  bandit:
    name: Bandit — Python Security Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r src/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium \
            -x venv,tests \
            || true  # don't fail yet, report first

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Print Bandit summary
        run: |
          python - << 'EOF'
          import json, sys
          with open("bandit-report.json") as f:
              report = json.load(f)
          results = report.get("results", [])
          metrics = report.get("metrics", {})
          print(f"\n{'='*60}")
          print(f"BANDIT SECURITY REPORT")
          print(f"{'='*60}")
          print(f"Files scanned : {metrics.get('_totals', {}).get('loc', 'N/A')} lines")
          print(f"Issues found  : {len(results)}")
          if results:
              print(f"\n{'SEVERITY':<12} {'CONFIDENCE':<12} {'FILE':<40} ISSUE")
              print("-"*100)
              for r in sorted(results, key=lambda x: x['issue_severity'], reverse=True):
                  print(f"{r['issue_severity']:<12} {r['issue_confidence']:<12} "
                        f"{r['filename'].replace('src/',''):<40} {r['issue_text']}")
          high = [r for r in results if r['issue_severity'] == 'HIGH']
          if high:
              print(f"\n❌ {len(high)} HIGH severity issues found — failing build")
              sys.exit(1)
          else:
              print(f"\n✅ No HIGH severity issues found")
          EOF

  pip-audit:
    name: pip-audit — Dependency CVE Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Upgrade pip and setuptools
        run: pip install --upgrade pip setuptools>=68 wheel

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            --format json \
            --output pip-audit-report.json \
            --ignore-vuln PYSEC-2022-42969 \
            || true  # capture output even on failure

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      - name: Print pip-audit summary
        run: |
          python - << 'EOF'
          import json, sys
          with open("pip-audit-report.json") as f:
              report = json.load(f)
          vulns = report.get("dependencies", [])
          vulnerable = [d for d in vulns if d.get("vulns")]
          print(f"\n{'='*60}")
          print(f"PIP-AUDIT DEPENDENCY VULNERABILITY REPORT")
          print(f"{'='*60}")
          print(f"Packages scanned  : {len(vulns)}")
          print(f"Vulnerable packages: {len(vulnerable)}")
          if vulnerable:
              print(f"\n{'PACKAGE':<30} {'VERSION':<15} CVEs")
              print("-"*80)
              for dep in vulnerable:
                  cves = ", ".join(v["id"] for v in dep["vulns"])
                  fix  = dep["vulns"][0].get("fix_versions", ["no fix"])
                  print(f"{dep['name']:<30} {dep['version']:<15} {cves}")
                  print(f"  └─ Fix available: {fix}")
              print(f"\n❌ Vulnerable dependencies found — review required")
              sys.exit(1)
          else:
              print(f"\n✅ No known vulnerabilities found")
          EOF

  trivy:
    name: Trivy — Filesystem & Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0 # don't fail pipeline, just report

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Run Trivy secret scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: table
          exit-code: 1 # fail if secrets found — non-negotiable

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif

  security-summary:
    name: Security Summary Comment
    runs-on: ubuntu-latest
    needs: [bandit, pip-audit, trivy]
    if: always() # run even if earlier jobs failed
    steps:
      - uses: actions/checkout@v3

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Post summary comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read bandit report
            let banditSummary = '⚠️ Report not available';
            try {
              const bandit = JSON.parse(
                fs.readFileSync('reports/bandit-report/bandit-report.json', 'utf8')
              );
              const results = bandit.results || [];
              const high   = results.filter(r => r.issue_severity === 'HIGH').length;
              const med    = results.filter(r => r.issue_severity === 'MEDIUM').length;
              const low    = results.filter(r => r.issue_severity === 'LOW').length;
              banditSummary = results.length === 0
                ? '✅ No issues found'
                : `🔴 HIGH: ${high} | 🟡 MEDIUM: ${med} | 🟢 LOW: ${low}`;
            } catch(e) { banditSummary = '⚠️ Could not parse report'; }

            // Read pip-audit report
            let pipSummary = '⚠️ Report not available';
            try {
              const audit = JSON.parse(
                fs.readFileSync('reports/pip-audit-report/pip-audit-report.json', 'utf8')
              );
              const vulnerable = (audit.dependencies || []).filter(d => d.vulns?.length > 0);
              pipSummary = vulnerable.length === 0
                ? '✅ No vulnerabilities found'
                : `❌ ${vulnerable.length} vulnerable package(s) found:\n` +
                  vulnerable.map(d =>
                    `  - \`${d.name}@${d.version}\`: ${d.vulns.map(v => v.id).join(', ')}`
                  ).join('\n');
            } catch(e) { pipSummary = '⚠️ Could not parse report'; }

            const jobStatus = {
              bandit  : '${{ needs.bandit.result }}',
              pipAudit: '${{ needs.pip-audit.result }}',
              trivy   : '${{ needs.trivy.result }}',
            };

            const statusEmoji = s => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';

            const body = `
            ## 🔒 Security Scan Report

            | Scanner | Status | Details |
            |---------|--------|---------|
            | Bandit (Python) | ${statusEmoji(jobStatus.bandit)} ${jobStatus.bandit} | ${banditSummary} |
            | pip-audit (CVEs) | ${statusEmoji(jobStatus.pipAudit)} ${jobStatus.pipAudit} | ${pipSummary} |
            | Trivy (Secrets/Filesystem) | ${statusEmoji(jobStatus.trivy)} ${jobStatus.trivy} | See GitHub Security tab |

            ### What was scanned
            - **Bandit**: Python source code in \`src/\` for security anti-patterns
            - **pip-audit**: All installed dependencies against PyPI CVE database
            - **Trivy**: Full filesystem for secrets, misconfigs, and known CVEs

            ### Action required
            - 🔴 **HIGH/CRITICAL** findings block the PR — must be resolved before merge
            - 🟡 **MEDIUM** findings are reported but do not block
            - 🔑 **Secrets detected by Trivy** always block the PR

            > Full reports available in [Actions artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            > CVE details visible in [Security tab](${{ github.server_url }}/${{ github.repository }}/security/code-scanning)
            `;

            // Find existing comment to update rather than creating duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner  : context.repo.owner,
              repo   : context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Security Scan Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner     : context.repo.owner,
                repo      : context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner       : context.repo.owner,
                repo        : context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
